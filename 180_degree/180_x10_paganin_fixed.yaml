# HTTomo pipeline — I13-2
# Scan: 180°  |  Objective: 10x  |  Phase: Paganin (fixed ratio_delta_beta)  |  COR: fixed (hardcoded)
# Pipeline: T13 — full reconstruction with known COR and known Paganin δ/β (no auto-finding)
# Before running: set center, distance, energy, ratio_delta_beta, update distortion_correction metadata_path

- method: standard_tomo
  module_path: httomo.data.hdf.loaders
  parameters:
    data_path: auto                           # path to projection data in the NeXus file; 'auto' reads from file metadata
    image_key_path: auto                      # path to scan-type key (0=projection, 1=flat, 2=dark); 'auto' = from metadata
    rotation_angles: auto                     # path to rotation angle array; 'auto' = from NeXus metadata
    preview:
      detector_x:
        start: null
        stop: null
      detector_y:
        start: null
        stop: null
    darks: null                               # external dark-field file; null = use darks embedded in this NeXus file
    flats: null                               # external flat-field file; null = use flats embedded in this NeXus file
    continuous_scan_subset: null              # row subset for continuous (fly) scans; null = use all projections

- method: remove_outlier
  module_path: httomolibgpu.misc.corr
  parameters:
    kernel_size: 3                            # filter kernel diameter for outlier detection (must be odd integer)
    dif: 1000                                 # minimum intensity difference between outlier and neighbourhood median

- method: dark_flat_field_correction
  module_path: httomolibgpu.prep.normalize
  parameters:
    flats_multiplier: 1.0                     # scale factor applied to flat-field intensities before correction
    darks_multiplier: 1.0                     # scale factor applied to dark-field intensities before correction
    upper_bound: null                         # clip normalised values above this threshold (null = no upper clamp)
    lower_bound: null                         # clip normalised values below this threshold (null = no lower clamp)

- method: distortion_correction_proj_discorpy
  module_path: httomolibgpu.prep.alignment
  parameters:
    metadata_path: /dls/i13/data/YEAR/VISIT/processing/distortion_corrections/results_4thOrder/Pos5_10x/coefficients_bwfw.txt  # CHANGE_HERE
    shift_xy: [0, 0]                          # distortion centre offset [x, y] in pixels from image corner
    step_xy: [1, 1]                           # sampling step in x and y directions (must be ≤ 1)
    order: 3                                  # spline interpolation order: 0=nearest, 1=linear, 3=cubic (default), max 5
    mode: constant                            # boundary padding: 'constant' (zeros), 'nearest', 'mirror', 'reflect', or 'wrap'

- method: remove_stripe_based_sorting
  module_path: httomolibgpu.prep.stripe
  parameters:
    size: 11                                  # median filter window size for stripe removal (null = auto-estimate from data)
    dim: 1                                    # filter orientation: 1 = vertical stripes (typical), 2 = diagonal

# Note: pixel_size = 3.25 µm / 10x = 0.325 µm. No minus_log — Paganin handles it.
- method: paganin_filter
  module_path: httomolibgpu.prep.phase
  parameters:
    pixel_size: 0.325   # µm
    distance: 0.020     # CHANGE_HERE: (detector_position_mm - 910) / 1000
    energy: 27.0        # CHANGE_HERE: beam energy in keV
    calculate_padding_value_method: next_power_of_2 # FFT padding strategy: 'next_power_of_2', 'next_fast_length', or 'use_pad_x_y'
    pad_x_y: null                             # explicit FFT padding [x, y] pixels; only used when method is 'use_pad_x_y'
    ratio_delta_beta: 2  # CHANGE_HERE: set to value found from paganin sweep

- method: FBP3d_tomobar
  module_path: httomolibgpu.recon.algorithm
  parameters:
    center: 1280  # CHANGE_HERE: set to COR found from absorption COR sweep
    detector_pad: false                       # horizontal padding to reduce arc artefacts; true = auto, int = explicit pixels
    filter_freq_cutoff: 0.35                  # ramp filter cutoff frequency (0.0–1.0; lower = smoother/less noise, higher = sharper)
    recon_size: null                          # output slice size in pixels (null = detector width; use to crop or expand)
    recon_mask_radius: 0.95                   # circular crop mask radius as fraction of slice (0.7–1.0; 2.0 = no masking)
    gpu_id: 0                                 # GPU device index (0 = first available GPU)
  save_result: true                           # also saves a float32 HDF5 of this output to the run directory; set false to disable

- method: calculate_stats
  module_path: httomo.methods
  parameters: {}
  id: statistics
  side_outputs:
    glob_stats: glob_stats

- method: rescale_to_int
  module_path: httomolib.misc.rescale
  parameters:
    perc_range_min: 0.0                       # lower percentile clip — values below this percentile map to 0
    perc_range_max: 100.0                     # upper percentile clip — values above this percentile map to integer max
    bits: 16                                  # output integer bit depth: 8 (uint8), 16 (uint16), or 32 (uint32)
    glob_stats: ${{statistics.side_outputs.glob_stats}}

- method: save_to_images
  module_path: httomolib.misc.images
  parameters:
    subfolder_name: images                    # output subdirectory name inside the HTTomo run folder
    axis: auto                                # slicing axis: 0=projections, 1=sinograms, 2=recon slices, 'auto'=HTTomo decides
    file_format: tif                          # image format: 'tif' (lossless), 'png' (lossless), or 'jpeg' (lossy)
    jpeg_quality: 95                          # JPEG compression quality 1–100 (only applies when file_format='jpeg')
    offset: 0                                 # starting index for output file names (useful for parallel chunked runs)
    asynchronous: true                        # write images in background while GPU processes the next chunk
