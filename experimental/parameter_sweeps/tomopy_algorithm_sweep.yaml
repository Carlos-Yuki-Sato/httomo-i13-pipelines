# HTTomo pipeline — I13-2  |  recon_comparison
# Algorithm : tomopy.recon.algorithm.recon  (TomoPy CPU reconstructions)
# Sweep     : algorithm  (6 reconstructions)
#
# TomoPy CPU-based algorithms — useful as a baseline and for algorithms not
# available in httomolibgpu.  Runs on CPU so slower than GPU methods.
#
# Algorithms swept:
#   gridrec  — direct Fourier gridding; fastest TomoPy method, similar to FBP
#   fbp      — standard filtered back-projection (CPU)
#   art      — Algebraic Reconstruction Technique
#   sirt     — Simultaneous Iterative Reconstruction Technique (CPU)
#   tv       — Total Variation regularised
#   grad     — Gradient descent
#
# Full TomoPy algorithm list: art, bart, fbp, gridrec, mlem, osem,
#   ospml_hybrid, ospml_quad, pml_hybrid, pml_quad, sirt, tv, grad, tikh
#
# Auto COR via find_center_vo. Set cor_initialisation_value to your known COR.
# Restrict detector_y start/stop to 10 central slices before running.

- method: standard_tomo
  module_path: httomo.data.hdf.loaders
  parameters:
    data_path: auto
    image_key_path: auto
    rotation_angles: auto
    preview:
      detector_x: {start: null, stop: null}
      detector_y:
        start: 1000    # CHANGE_HERE: mid-detector minus 5 (total_rows / 2 − 5)
        stop:  1010    # start + 9 = 10 slices
    darks: null
    flats: null
    continuous_scan_subset: null

- method: remove_outlier
  module_path: httomolibgpu.misc.corr
  parameters:
    kernel_size: 3
    dif: 1000

- method: dark_flat_field_correction
  module_path: httomolibgpu.prep.normalize
  parameters:
    flats_multiplier: 1.0
    darks_multiplier: 1.0
    upper_bound: null                         # clip normalised values above this threshold (null = no upper clamp)
    lower_bound: null                         # clip normalised values below this threshold (null = no lower clamp)

- method: find_center_vo
  module_path: httomolibgpu.recon.rotation
  parameters:
    ind: mid
    average_radius: 3
    cor_initialisation_value: 1290  # CHANGE_HERE: approximate COR if known
    smin: -300
    smax: 300
    srad: 6.0
    step: 0.5
    ratio: 0.5
    drop: 20
  id: centering
  side_outputs:
    cor: centre_of_rotation

- method: remove_stripe_based_sorting
  module_path: httomolibgpu.prep.stripe
  parameters:
    size: 11
    dim: 1

- method: minus_log
  module_path: httomolibgpu.prep.normalize
  parameters: {}

# ── RECONSTRUCTION SWEEP ──────────────────────────────────────────────────────
# Swept parameter : algorithm
- method: recon
  module_path: tomopy.recon.algorithm
  parameters:
    center: ${{centering.side_outputs.centre_of_rotation}}
    sinogram_order: false
    algorithm: !Sweep ["gridrec", "fbp", "art", "sirt", "tv", "grad"]
    init_recon: null
  save_result: false

- method: calculate_stats
  module_path: httomo.methods
  parameters: {}
  id: statistics
  side_outputs:
    glob_stats: glob_stats

- method: rescale_to_int
  module_path: httomolib.misc.rescale
  parameters:
    perc_range_min: 1.0
    perc_range_max: 99.0
    bits: 16
    glob_stats: ${{statistics.side_outputs.glob_stats}}

- method: save_to_images
  module_path: httomolib.misc.images
  parameters:
    subfolder_name: tomopy
    axis: auto
    file_format: tif
    asynchronous: true
