# HTTomo pipeline — I13-2  |  recon_comparison
# Algorithm : ADMM3d_tomobar  (Alternating Direction Method of Multipliers, GPU 3D)
# Sweep     : regularisation_type  ROF_TV vs PD_TV  (2 reconstructions)
#
# Run ADMM3d_lambda_sweep.yaml first to find an optimal lambda, then use
# this file to compare the two TV regularisation types at that lambda.
#
#   PD_TV  (Primal-Dual Total Variation, default) — generally more stable
#   ROF_TV (Rudin-Osher-Fatemi Total Variation)   — may give sharper edges
#
# Fixed lambda: 0.005 — update after running ADMM3d_lambda_sweep.yaml.
#
# Auto COR via find_center_vo. Set cor_initialisation_value to your known COR.
# Restrict detector_y start/stop to 10 central slices before running.

- method: standard_tomo
  module_path: httomo.data.hdf.loaders
  parameters:
    data_path: auto
    image_key_path: auto
    rotation_angles: auto
    preview:
      detector_x: {start: null, stop: null}
      detector_y:
        start: 1000    # CHANGE_HERE: mid-detector minus 5 (total_rows / 2 − 5)
        stop:  1010    # start + 9 = 10 slices
    darks: null
    flats: null
    continuous_scan_subset: null

- method: remove_outlier
  module_path: httomolibgpu.misc.corr
  parameters:
    kernel_size: 3
    dif: 1000

- method: dark_flat_field_correction
  module_path: httomolibgpu.prep.normalize
  parameters:
    flats_multiplier: 1.0
    darks_multiplier: 1.0
    upper_bound: null                         # clip normalised values above this threshold (null = no upper clamp)
    lower_bound: null                         # clip normalised values below this threshold (null = no lower clamp)

- method: find_center_vo
  module_path: httomolibgpu.recon.rotation
  parameters:
    ind: mid
    average_radius: 3
    cor_initialisation_value: 1290  # CHANGE_HERE: approximate COR if known
    smin: -300
    smax: 300
    srad: 6.0
    step: 0.5
    ratio: 0.5
    drop: 20
  id: centering
  side_outputs:
    cor: centre_of_rotation

- method: remove_stripe_based_sorting
  module_path: httomolibgpu.prep.stripe
  parameters:
    size: 11
    dim: 1

- method: minus_log
  module_path: httomolibgpu.prep.normalize
  parameters: {}

# ── RECONSTRUCTION SWEEP ──────────────────────────────────────────────────────
# Swept parameter : regularisation_type
- method: ADMM3d_tomobar
  module_path: httomolibgpu.recon.algorithm
  parameters:
    center: ${{centering.side_outputs.centre_of_rotation}}
    detector_pad: false
    recon_size: null
    recon_mask_radius: 0.95
    iterations: 3
    subsets_number: 24
    data_fidelity: LS
    initialisation: FBP
    ADMM_rho_const: 1.0
    ADMM_relax_par: 1.7
    regularisation_type: !Sweep ["ROF_TV", "PD_TV"]
    regularisation_parameter: 0.005               # CHANGE_HERE: use optimal lambda from lambda_sweep
    regularisation_iterations: 40
    regularisation_half_precision: true
    nonnegativity: false
  save_result: false

- method: calculate_stats
  module_path: httomo.methods
  parameters: {}
  id: statistics
  side_outputs:
    glob_stats: glob_stats

- method: rescale_to_int
  module_path: httomolib.misc.rescale
  parameters:
    perc_range_min: 1.0
    perc_range_max: 99.0
    bits: 16
    glob_stats: ${{statistics.side_outputs.glob_stats}}

- method: save_to_images
  module_path: httomolib.misc.images
  parameters:
    subfolder_name: ADMM3d_reg_type
    axis: auto
    file_format: tif
    asynchronous: true
