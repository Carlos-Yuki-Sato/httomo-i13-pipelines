# HTTomo pipeline — I13-2 | ITERATIVE EVALUATION
# Iteration : 006
# Algorithm : FISTA3d_tomobar  (Fast Iterative Shrinkage-Thresholding, GPU 3D)
# Changes   : TV regularisation (PD_TV, lambda=0.001) + ordered subsets (6)
# Output    : /dls/i13/data/2026/cm44160-2/processing/httomo/eval/iter_006/
#
# Run with httomo/latest on a local workstation:
#   ssh i13-ws010 "module load httomo/latest && python -m httomo run '<nxs>' '<this_file>' '<output>'"
#
# Dataset   : /dls/i13/data/2026/mg41329-1/raw/194481.nxs
#             2081 proj × 2160 rows × 2560 cols  →  mid-row = 1080

- method: standard_tomo
  module_path: httomo.data.hdf.loaders
  parameters:
    data_path: auto
    image_key_path: auto
    rotation_angles: auto
    preview:
      detector_x: {start: null, stop: null}
      detector_y:
        start: 1078  # mid-detector − 2  (2160 / 2 − 2)
        stop:  1083  # mid-detector + 3  (5 rows total)
    darks: null
    flats: null
    continuous_scan_subset: null

- method: remove_outlier
  module_path: httomolibgpu.misc.corr
  parameters:
    kernel_size: 3
    dif: 1000

- method: dark_flat_field_correction
  module_path: httomolibgpu.prep.normalize
  parameters:
    flats_multiplier: 1.0
    darks_multiplier: 1.0
    upper_bound: null
    lower_bound: null

- method: find_center_vo
  module_path: httomolibgpu.recon.rotation
  parameters:
    ind: mid
    average_radius: 0  # 0 = single mid-row only; safe for thin-slice eval
    cor_initialisation_value: 1292  # confirmed auto-COR: 1292.5
    smin: -300
    smax: 300
    srad: 6.0
    step: 0.5
    ratio: 0.5
    drop: 20
  id: centering
  side_outputs:
    cor: centre_of_rotation

- method: remove_stripe_based_sorting
  module_path: httomolibgpu.prep.stripe
  parameters:
    size: 11
    dim: 1

- method: minus_log
  module_path: httomolibgpu.prep.normalize
  parameters: {}

- method: FISTA3d_tomobar
  module_path: httomolibgpu.recon.algorithm
  parameters:
    center: ${{centering.side_outputs.centre_of_rotation}}
    detector_pad: false
    recon_size: null
    recon_mask_radius: 0.95
    iterations: 20
    subsets_number: 6
    data_fidelity: LS
    regularisation_type: PD_TV
    regularisation_parameter: 0.001
    regularisation_iterations: 50
    regularisation_half_precision: true
    nonnegativity: false
  save_result: false

- method: calculate_stats
  module_path: httomo.methods
  parameters: {}
  id: statistics
  side_outputs:
    glob_stats: glob_stats

- method: rescale_to_int
  module_path: httomolib.misc.rescale
  parameters:
    perc_range_min: 1.0
    perc_range_max: 99.0
    bits: 8
    glob_stats: ${{statistics.side_outputs.glob_stats}}

- method: save_to_images
  module_path: httomolib.misc.images
  parameters:
    subfolder_name: images
    axis: auto
    file_format: png
    asynchronous: true
